spec:
  name: horand-app
  region: fra

  databases:
    - engine: PG
      name: db
      num_nodes: 1
      size: db-s-dev-database
      version: "16"

  services:
    - name: api
      source_dir: /server
      dockerfile_path: Dockerfile
      http_port: 5000
      instance_count: 1
      instance_size_slug: basic-xxs
      health_check:
        http_path: /api/health
      envs:
        - key: ConnectionStrings__DefaultConnection
          value: ${db.DATABASE_URL}
          scope: RUN_TIME
        - key: Jwt__Secret
          value: ${JWT_SECRET}
          scope: RUN_TIME
          type: SECRET
        - key: Jwt__Issuer
          value: Horand
          scope: RUN_TIME
        - key: Jwt__Audience
          value: HorandApp
          scope: RUN_TIME
        - key: Cors__Origins__0
          value: ${APP_URL}
          scope: RUN_TIME
        - key: ASPNETCORE_ENVIRONMENT
          value: Production
          scope: RUN_TIME
      routes:
        - path: /api
        - path: /swagger

    - name: client
      source_dir: /client
      dockerfile_path: Dockerfile
      http_port: 3000
      instance_count: 1
      instance_size_slug: basic-xxs
      build_command: ""
      envs:
        - key: NEXT_PUBLIC_API_URL
          value: ${APP_URL}
          scope: BUILD_TIME
      routes:
        - path: /
